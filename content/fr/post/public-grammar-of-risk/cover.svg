<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1c2f"/>
      <stop offset="100%" style="stop-color:#172b45"/>
    </linearGradient>
    <linearGradient id="fade-l" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0e1c2f;stop-opacity:1"/>
      <stop offset="14%" style="stop-color:#0e1c2f;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="fade-r" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="86%" style="stop-color:#172b45;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#172b45;stop-opacity:1"/>
    </linearGradient>
    <!-- Lueurs par strate -->
    <radialGradient id="glow-1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a89edc;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#a89edc;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow-2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7bbde8;stop-opacity:0.16"/>
      <stop offset="100%" style="stop-color:#7bbde8;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow-3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e08880;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#e08880;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7ec0f5;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#7ec0f5;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Lueurs diffuses par strate -->
  <ellipse cx="600" cy="145" rx="500" ry="28" fill="url(#glow-1)"/>
  <ellipse cx="600" cy="225" rx="500" ry="28" fill="url(#glow-2)"/>
  <ellipse cx="600" cy="305" rx="500" ry="28" fill="url(#glow-3)"/>

  <!-- Strate 6 — Monetary -->
  <rect x="0" y="530" width="1200" height="32" fill="#a58b42" opacity="0.2" rx="0"/>
  <line x1="160" y1="546" x2="1040" y2="546" stroke="#e0c060" stroke-width="2" opacity="0.7"/>

  <!-- Strate 5 — Credit -->
  <rect x="0" y="450" width="1200" height="32" fill="#4e9d87" opacity="0.22" rx="0"/>
  <line x1="160" y1="466" x2="1040" y2="466" stroke="#6eddb8" stroke-width="2" opacity="0.75"/>

  <!-- Strate 4 — Parametrization -->
  <rect x="0" y="370" width="1200" height="32" fill="#8d72b3" opacity="0.24" rx="0"/>
  <line x1="160" y1="386" x2="1040" y2="386" stroke="#c0a8e8" stroke-width="2" opacity="0.78"/>

  <!-- Strate 3 — Breaks -->
  <rect x="0" y="290" width="1200" height="32" fill="#b56a62" opacity="0.25" rx="0"/>
  <line x1="160" y1="306" x2="1040" y2="306" stroke="#f09890" stroke-width="2.5" opacity="0.82"/>

  <!-- Strate 2 — Terrain -->
  <rect x="0" y="210" width="1200" height="32" fill="#5b88b0" opacity="0.26" rx="0"/>
  <line x1="160" y1="226" x2="1040" y2="226" stroke="#90d0f0" stroke-width="2.5" opacity="0.85"/>

  <!-- Strate 1 — Powers -->
  <rect x="0" y="130" width="1200" height="32" fill="#7d73bb" opacity="0.28" rx="0"/>
  <line x1="160" y1="146" x2="1040" y2="146" stroke="#bab0f0" stroke-width="3" opacity="0.9"/>

  <!-- Colonne gauche -->
  <line x1="210" y1="146" x2="210" y2="546" stroke="#7ec0f5" stroke-width="1.5" opacity="0.38" stroke-dasharray="4 6"/>
  <circle cx="210" cy="146" r="7" fill="#bab0f0" opacity="0.95"/>
  <circle cx="210" cy="146" r="18" fill="#bab0f0" opacity="0.18"/>
  <circle cx="210" cy="226" r="6" fill="#90d0f0" opacity="0.9"/>
  <circle cx="210" cy="306" r="6" fill="#f09890" opacity="0.88"/>
  <circle cx="210" cy="386" r="6" fill="#c0a8e8" opacity="0.88"/>
  <circle cx="210" cy="466" r="6" fill="#6eddb8" opacity="0.88"/>
  <circle cx="210" cy="546" r="6" fill="#e0c060" opacity="0.88"/>

  <!-- Colonne droite -->
  <line x1="990" y1="146" x2="990" y2="546" stroke="#7ec0f5" stroke-width="1.5" opacity="0.38" stroke-dasharray="4 6"/>
  <circle cx="990" cy="146" r="7" fill="#bab0f0" opacity="0.85"/>
  <circle cx="990" cy="226" r="6" fill="#90d0f0" opacity="0.82"/>
  <circle cx="990" cy="306" r="6" fill="#f09890" opacity="0.8"/>
  <circle cx="990" cy="386" r="6" fill="#c0a8e8" opacity="0.8"/>
  <circle cx="990" cy="466" r="6" fill="#6eddb8" opacity="0.8"/>
  <circle cx="990" cy="546" r="6" fill="#e0c060" opacity="0.8"/>

  <!-- Signal central + lueur -->
  <ellipse cx="600" cy="346" rx="80" ry="220" fill="url(#glow-c)"/>
  <line x1="600" y1="106" x2="600" y2="564" stroke="#7ec0f5" stroke-width="2" opacity="0.42" stroke-dasharray="3 8"/>
  <polygon points="600,576 593,558 607,558" fill="#7ec0f5" opacity="0.65"/>
  <circle cx="600" cy="146" r="9" fill="#7ec0f5" opacity="0.88"/>
  <circle cx="600" cy="146" r="22" fill="#7ec0f5" opacity="0.14"/>
  <circle cx="600" cy="226" r="7" fill="#7ec0f5" opacity="0.78"/>
  <circle cx="600" cy="306" r="7" fill="#7ec0f5" opacity="0.72"/>
  <circle cx="600" cy="386" r="7" fill="#7ec0f5" opacity="0.66"/>
  <circle cx="600" cy="466" r="7" fill="#7ec0f5" opacity="0.6"/>
  <circle cx="600" cy="546" r="7" fill="#7ec0f5" opacity="0.55"/>

  <!-- Bruit -->
  <circle cx="380" cy="185" r="3" fill="#7ec0f5" opacity="0.5"/>
  <circle cx="820" cy="265" r="3" fill="#7ec0f5" opacity="0.48"/>
  <circle cx="450" cy="345" r="3" fill="#7ec0f5" opacity="0.44"/>
  <circle cx="760" cy="425" r="3" fill="#7ec0f5" opacity="0.44"/>
  <circle cx="330" cy="505" r="3" fill="#7ec0f5" opacity="0.4"/>
  <circle cx="880" cy="170" r="3" fill="#7ec0f5" opacity="0.48"/>
  <circle cx="520" cy="495" r="3" fill="#7ec0f5" opacity="0.4"/>

  <rect x="0" y="0" width="1200" height="630" fill="url(#fade-l)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#fade-r)"/>
  <rect x="0" y="0" width="1200" height="80" fill="#0e1c2f" opacity="0.55"/>
  <rect x="0" y="578" width="1200" height="52" fill="#172b45" opacity="0.55"/>
</svg>
