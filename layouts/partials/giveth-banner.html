{{ $isFrench := eq .Site.Language.Lang "fr" }}
<div class="giveth-banner">
    <div class="giveth-banner-inner">
        <span class="giveth-banner-text">
            {{ if $isFrench }}
                arem.blog participe au <strong>round Ethereum Security QF</strong> sur Giveth, jusqu'au 14 mai
            {{ else }}
                arem.blog is part of the <strong>Ethereum Security QF Round</strong> on Giveth, until May 14
            {{ end }}
        </span>
        <a class="giveth-banner-link" href="https://giveth.io/project/editorial-observer" target="_blank" rel="noopener">
            {{ if $isFrench }}Soutenir{{ else }}Support{{ end }} →
        </a>
    </div>
</div>

<style>
.giveth-banner {
    background: #1c2530;
    border-top: 2px solid #5b9bd5;
    border-bottom: 1px solid #2a3542;
    width: 100%;
}
.giveth-banner-inner {
    max-width: 100%;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.4;
}
.giveth-banner-text {
    color: #cdd9e5;
}
.giveth-banner-text strong {
    color: #f5f7fa;
    font-weight: 500;
}
.giveth-banner-link {
    color: #5b9bd5;
    text-decoration: none;
    font-weight: 500;
    white-space: nowrap;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s ease;
}
.giveth-banner-link:hover {
    border-bottom-color: #5b9bd5;
}
@media (max-width: 640px) {
    .giveth-banner-inner {
        flex-direction: column;
        gap: 6px;
        padding: 12px 16px;
        font-size: 13px;
        text-align: center;
    }
}
</style>
